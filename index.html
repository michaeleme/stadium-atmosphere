<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Soccer Stadium</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    #scene-container { width: 100%; height: 100%; }
  </style>
</head>
<body>
  <div id="scene-container"></div>

  <!-- Import map to resolve "three" -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.161.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    console.log("Three.js loaded successfully!");

    const container = document.getElementById("scene-container");

    // ----- Scene, camera, renderer -----
    const scene = new THREE.Scene();
    const dawnSkyColor = new THREE.Color(0xff8844);
    scene.background = dawnSkyColor;

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(0, 5, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    container.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 0, 0);
    controls.enableDamping = true;

    // ----- Lights -----
    const hemiLight = new THREE.HemisphereLight(0xffffee, 0x806040, 0.5);
    scene.add(hemiLight);

    const sunLight = new THREE.DirectionalLight(0xfff2c0, 1.2);  // Warm golden color, brighter
    sunLight.position.set(-50, 25, 50);  // Low angle from the side (sunrise position)
    sunLight.castShadow = true;
    sunLight.shadow.mapSize.set(2048, 2048);
    scene.add(sunLight);

    // ----- Field dimensions -----
    const FIELD_WIDTH = 105;
    const FIELD_HEIGHT = 68;

    // ----- Grass texture (striped) -----
    function makeGrassPattern() {
      const size = 256;
      const canvas = document.createElement("canvas");
      canvas.width = canvas.height = size;
      const ctx = canvas.getContext("2d");

      const color1 = "#4faa3c";
      const color2 = "#66c24a";

      const stripeWidth = size / 8;
      for (let i = 0; i < 8; i++) {
        ctx.fillStyle = (i % 2 === 0) ? color1 : color2;
        ctx.fillRect(i * stripeWidth, 0, stripeWidth, size);
      }
      return canvas;
    }

    const grassTexture = new THREE.CanvasTexture(makeGrassPattern());
    grassTexture.wrapS = grassTexture.wrapT = THREE.RepeatWrapping;
    grassTexture.repeat.set(4, 4);

    const fieldGeom = new THREE.PlaneGeometry(FIELD_WIDTH, FIELD_HEIGHT);
    const fieldMat = new THREE.MeshLambertMaterial({ map: grassTexture });
    const field = new THREE.Mesh(fieldGeom, fieldMat);
    field.rotation.x = -Math.PI / 2;
    field.receiveShadow = true;
    scene.add(field);

    // ----- Field lines -----
    const lineMaterial = new THREE.LineBasicMaterial({ color: 0xffffff });
    const LINE_Y = 0.05;

    function addRectangle(width, height, centerZ = 0) {
      const hw = width / 2;
      const hh = height / 2;
      const zOffset = centerZ;

      const points = [
        new THREE.Vector3(-hw, LINE_Y, -hh + zOffset),
        new THREE.Vector3(hw,  LINE_Y, -hh + zOffset),
        new THREE.Vector3(hw,  LINE_Y,  hh + zOffset),
        new THREE.Vector3(-hw, LINE_Y,  hh + zOffset),
        new THREE.Vector3(-hw, LINE_Y, -hh + zOffset)
      ];

      const geometry = new THREE.BufferGeometry().setFromPoints(points);
      const line = new THREE.Line(geometry, lineMaterial);
      scene.add(line);
    }

    function addLine(x1, z1, x2, z2) {
      const points = [
        new THREE.Vector3(x1, LINE_Y, z1),
        new THREE.Vector3(x2, LINE_Y, z2)
      ];
      const geometry = new THREE.BufferGeometry().setFromPoints(points);
      const line = new THREE.Line(geometry, lineMaterial);
      scene.add(line);
    }

    function addCircle(radius, segments = 64) {
      const points = [];
      for (let i = 0; i <= segments; i++) {
        const t = (i / segments) * Math.PI * 2;
        const x = Math.cos(t) * radius;
        const z = Math.sin(t) * radius;
        points.push(new THREE.Vector3(x, LINE_Y, z));
      }
      const geometry = new THREE.BufferGeometry().setFromPoints(points);
      const line = new THREE.Line(geometry, lineMaterial);
      scene.add(line);
    }

    // Outer boundary
    addRectangle(FIELD_WIDTH, FIELD_HEIGHT);

    // Halfway line
    addLine(-FIELD_WIDTH / 2, 0, FIELD_WIDTH / 2, 0);

    // Center circle + spot
    addCircle(9.15);
    const spotGeom = new THREE.SphereGeometry(0.3, 16, 16);
    const spotMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
    const centerSpot = new THREE.Mesh(spotGeom, spotMat);
    centerSpot.position.set(0, LINE_Y, 0);
    scene.add(centerSpot);

    // Penalty & goal boxes
    const penaltyDepth = 16.5;
    const penaltyWidth = 40.32;
    const goalDepth = 5.5;
    const goalWidth = 18.32;
    const halfHeight = FIELD_HEIGHT / 2;

    addRectangle(penaltyWidth, penaltyDepth * 2,  halfHeight - penaltyDepth);
    addRectangle(penaltyWidth, penaltyDepth * 2, -halfHeight + penaltyDepth);
    addRectangle(goalWidth, goalDepth * 2,  halfHeight - goalDepth);
    addRectangle(goalWidth, goalDepth * 2, -halfHeight + goalDepth);

    // Penalty spots
    function addPenaltySpot(z) {
      const s = new THREE.Mesh(spotGeom, spotMat);
      s.position.set(0, LINE_Y, z);
      scene.add(s);
    }
    addPenaltySpot(halfHeight - 11);
    addPenaltySpot(-halfHeight + 11);

    // ----- Goals -----
    function addGoal(zSide) {
      const goalWidth = 7.32;
      const goalHeight = 2.44;
      const depth = 2.5;

      const barMaterial = new THREE.MeshBasicMaterial({ color: 0xffffff });
      const postGeom = new THREE.BoxGeometry(0.2, goalHeight, 0.2);
      const crossGeom = new THREE.BoxGeometry(goalWidth, 0.2, 0.2);
      const sideGeom = new THREE.BoxGeometry(0.2, goalHeight, depth);

      const leftPost = new THREE.Mesh(postGeom, barMaterial);
      const rightPost = new THREE.Mesh(postGeom, barMaterial);
      const crossbar = new THREE.Mesh(crossGeom, barMaterial);
      const leftSide = new THREE.Mesh(sideGeom, barMaterial);
      const rightSide = new THREE.Mesh(sideGeom, barMaterial);

      const z = zSide * (halfHeight + 0.1);

      leftPost.position.set(-goalWidth / 2, goalHeight / 2, z);
      rightPost.position.set( goalWidth / 2, goalHeight / 2, z);
      crossbar.position.set(0, goalHeight, z);
      leftSide.position.set(-goalWidth / 2, goalHeight / 2, z - zSide * depth / 2);
      rightSide.position.set(goalWidth / 2, goalHeight / 2, z - zSide * depth / 2);

      scene.add(leftPost, rightPost, crossbar, leftSide, rightSide);
    }
    addGoal(1);
    addGoal(-1);

    // ----- Stands -----
    function createStands() {
      const steps = 8;
      const stepHeight = 1.2;
      const stepDepth = 2.5;
      const color = 0x44ff44;

      const standMat = new THREE.MeshLambertMaterial({ color });

      for (let i = 0; i < steps; i++) {
        const h = (i + 1) * stepHeight;
        const d = (i + 1) * stepDepth;

        const geom = new THREE.BoxGeometry(FIELD_WIDTH + 20, stepHeight, stepDepth);
        const left = new THREE.Mesh(geom, standMat);
        const right = new THREE.Mesh(geom, standMat);

        left.position.set(0, h / 2, -halfHeight - d);
        right.position.set(0, h / 2, halfHeight + d);

        scene.add(left, right);
      }

      const halfWidth = FIELD_WIDTH / 2;
      for (let i = 0; i < steps; i++) {
        const h = (i + 1) * stepHeight;
        const d = (i + 1) * stepDepth;

        const geom = new THREE.BoxGeometry(stepDepth, stepHeight, FIELD_HEIGHT + 20);
        const near = new THREE.Mesh(geom, standMat);
        const far = new THREE.Mesh(geom, standMat);

        near.position.set(-halfWidth - d, h / 2, 0);
        far.position.set( halfWidth + d, h / 2, 0);

        scene.add(near, far);
      }
    }
    createStands();

    console.log("Scene setup complete!");

    // ----- Resize -----
    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ----- Animation -----
    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
